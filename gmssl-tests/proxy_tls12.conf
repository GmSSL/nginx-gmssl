worker_processes  1;
daemon off;
master_process off;

error_log  logs/proxy-tls12-error.log debug;
pid        logs/proxy-tls12.pid;

events {
    worker_connections  64;
}

http {
    access_log logs/proxy-tls12-access.log;

    server {
        listen 8080;
        server_name backend;

        root /Users/guanzhi/code/github/GmSSL-Nginx/nginx-1.30.2/gmssl-tests/backend;
    }

    server {
        listen 8446 ssl;
        server_name localhost;

        ssl_protocols TLSv1.2;
        ssl_certificate /Users/guanzhi/code/github/GmSSL/build/sm2certs.pem;
        ssl_certificate_key /Users/guanzhi/code/github/GmSSL/build/sm2signkey.pem;
        ssl_password_file /Users/guanzhi/code/github/GmSSL-Nginx/nginx-1.30.2/gmssl-tests/pass.txt;

        location / {
            proxy_pass http://127.0.0.1:8080;
        }
    }
}
