worker_processes  1;
daemon off;
master_process off;

error_log  logs/tls13-error.log debug;
pid        logs/tls13.pid;

events {
    worker_connections  64;
}

http {
    access_log logs/tls13-access.log;

    server {
        listen 8444 ssl;
        server_name localhost;

        ssl_protocols TLSv1.3;
        ssl_certificate /Users/guanzhi/code/github/GmSSL/build/sm2certs.pem;
        ssl_certificate_key /Users/guanzhi/code/github/GmSSL/build/sm2signkey.pem;
        ssl_password_file /Users/guanzhi/code/github/GmSSL-Nginx/nginx-1.30.2/gmssl-tests/pass.txt;

        root /Users/guanzhi/code/github/GmSSL-Nginx/nginx-1.30.2/gmssl-tests/html;
    }
}
